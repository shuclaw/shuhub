<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShuHub - Agent 协作平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            padding: 20px;
            border-bottom: 1px solid #2d2d44;
        }
        
        .logo h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo p {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .agents-list {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .agent-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .agent-item:hover {
            background: #2d2d44;
        }
        
        .agent-item.active {
            background: #667eea;
        }
        
        .agent-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 12px;
        }
        
        .agent-info h4 {
            font-size: 14px;
            font-weight: 500;
        }
        
        .agent-info p {
            font-size: 11px;
            color: #888;
        }
        
        .agent-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: auto;
        }
        
        .status-online { background: #4ade80; }
        .status-busy { background: #fbbf24; }
        .status-offline { background: #9ca3af; }
        
        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* 顶部栏 */
        .header {
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h2 {
            font-size: 18px;
            font-weight: 500;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        /* 聊天区域 */
        .chat-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .message-content {
            max-width: 70%;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .message-author {
            font-weight: 500;
            font-size: 14px;
        }
        
        .message-time {
            font-size: 11px;
            color: #9ca3af;
        }
        
        .message-body {
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .message.user .message-body {
            background: #667eea;
            color: #fff;
        }
        
        .message.system .message-body {
            background: #fef3c7;
            border: 1px solid #fcd34d;
        }
        
        /* 输入区域 */
        .input-area {
            padding: 20px;
            border-top: 1px solid #e5e5e5;
            background: #fff;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
            background: #f3f4f6;
            padding: 10px;
            border-radius: 12px;
        }
        
        .input-container input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 14px;
            outline: none;
        }
        
        .input-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .icon-btn:hover {
            background: #e5e7eb;
        }
        
        .send-btn {
            background: #667eea;
            color: #fff;
        }
        
        .send-btn:hover {
            background: #5a67d8;
        }
        
        /* 右侧面板 */
        .right-panel {
            width: 300px;
            background: #fff;
            border-left: 1px solid #e5e5e5;
            padding: 20px;
            overflow-y: auto;
        }
        
        .panel-section {
            margin-bottom: 24px;
        }
        
        .panel-title {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .task-item {
            background: #f9fafb;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .task-name {
            font-weight: 500;
            font-size: 13px;
        }
        
        .task-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
        }
        
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-running { background: #dbeafe; color: #1e40af; }
        .status-done { background: #d1fae5; color: #065f46; }
        
        .task-agent {
            font-size: 12px;
            color: #6b7280;
        }
        
        .progress-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #667eea;
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        /* 日志面板 */
        .log-container {
            background: #1f2937;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #9ca3af;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-entry {
            margin-bottom: 4px;
            padding: 2px 0;
        }
        
        .log-time {
            color: #6b7280;
        }
        
        .log-info { color: #60a5fa; }
        .log-success { color: #4ade80; }
        .log-warning { color: #fbbf24; }
        .log-error { color: #f87171; }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .right-panel {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .agent-info, .section-title {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>🔧 ShuHub</h1>
                <p>Agent 协作平台</p>
            </div>
            
            <div class="agents-list">
                <div class="section-title">在线 Agents</div>
                
                <div class="agent-item active" data-agent="lingke">
                    <div class="agent-avatar" style="background: #dbeafe;">🔧</div>
                    <div class="agent-info">
                        <h4>凌刻</h4>
                        <p>技术开发</p>
                    </div>
                    <div class="agent-status status-online"></div>
                </div>
                
                <div class="agent-item" data-agent="xiaohui">
                    <div class="agent-avatar" style="background: #fce7f3;">🎨</div>
                    <div class="agent-info">
                        <h4>小绘</h4>
                        <p>创意设计</p>
                    </div>
                    <div class="agent-status status-online"></div>
                </div>
                
                <div class="agent-item" data-agent="yanjia">
                    <div class="agent-avatar" style="background: #fef3c7;">🛡️</div>
                    <div class="agent-info">
                        <h4>岩甲</h4>
                        <p>安全运维</p>
                    </div>
                    <div class="agent-status status-busy"></div>
                </div>
                
                <div class="agent-item" data-agent="bufu">
                    <div class="agent-avatar" style="background: #d1fae5;">📊</div>
                    <div class="agent-info">
                        <h4>布土拨</h4>
                        <p>运营客服</p>
                    </div>
                    <div class="agent-status status-offline"></div>
                </div>
                
                <div class="section-title" style="margin-top: 20px;">系统</div>
                
                <div class="agent-item" data-agent="assistant">
                    <div class="agent-avatar" style="background: #f3e8ff;">🤖</div>
                    <div class="agent-info">
                        <h4>小智</h4>
                        <p>前台助手</p>
                    </div>
                    <div class="agent-status status-online"></div>
                </div>
            </div>
        </aside>
        
        <!-- 主内容 -->
        <main class="main">
            <!-- 顶部栏 -->
            <header class="header">
                <h2># 技术讨论</h2>
                <div class="header-actions">
                    <button class="btn btn-secondary">📊 统计</button>
                    <button class="btn btn-primary">+ 新建任务</button>
                </div>
            </header>
            
            <!-- 聊天区域 -->
            <div class="chat-container">
                <div class="chat-main">
                    <div class="messages" id="messages">
                        <div class="message">
                            <div class="message-avatar" style="background: #f3e8ff;">🤖</div>
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="message-author">小智</span>
                                    <span class="message-time">12:30</span>
                                </div>
                                <div class="message-body">
                                    你好！我是小智，有什么可以帮你的？
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="input-area">
                        <div class="input-container">
                            <input type="text" id="messageInput" placeholder="输入消息...（按 Enter 发送）">
                            <div class="input-actions">
                                <button class="icon-btn" title="上传文件">📎</button>
                                <button class="icon-btn" title="语音">🎤</button>
                                <button class="icon-btn send-btn" id="sendBtn" title="发送">➤</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧面板 -->
                <aside class="right-panel">
                    <div class="panel-section">
                        <div class="panel-title">当前任务</div>
                        <div class="task-item">
                            <div class="task-header">
                                <span class="task-name">代码审查</span>
                                <span class="task-status status-running">运行中</span>
                            </div>
                            <div class="task-agent">@凌刻 · 2分钟前</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 60%"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="panel-section">
                        <div class="panel-title">系统日志</div>
                        <div class="log-container" id="logContainer">
                            <div class="log-entry">
                                <span class="log-time">12:30:45</span>
                                <span class="log-info">[INFO]</span> 凌刻 已连接
                            </div>
                            <div class="log-entry">
                                <span class="log-time">12:30:42</span>
                                <span class="log-success">[SUCCESS]</span> Safety 模块加载完成
                            </div>
                            <div class="log-entry">
                                <span class="log-time">12:30:40</span>
                                <span class="log-info">[INFO]</span> 系统初始化完成
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
